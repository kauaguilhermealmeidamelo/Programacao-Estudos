<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div>
        <form action="index.html">
            <h1>Cadastro de Paciente</h1>

            <label for="nome">Nome:</label> <!--Rotulo-->
            <input type="text" id="" name="nome" required><!--Entrada-->

            <label for="Cpf">Cpf:</label>
            <input type="number" id="" name="Cpf" placeholder="000.000.000-00" maxlength="14" required>

            <label for="endereco">Endereço:</label>
            <input type="text" id="" name="endereco" required>

            <label for="tel">Telefone:</label>
            <input type="tel" id="" name="tel" required>

            <label for="email">E-Mail:</label>
            <input type="email" id="" name="email" required>

            <label for="dataNascimento">Data de Nascimento:</label>
            <input type="date" id="" name="dataNascimento" required>

            <label for="login">Login:</label>
            <input type="text" id="" name="login" required>

            <label for="password">Senha:</label>
            <input type="password" id="" name="password" required>

            <input type="submit" id="enviar"></input>
        </form>
    </div>



</body>

</html>
