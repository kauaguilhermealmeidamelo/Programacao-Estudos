<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            padding: 20px;
            text-align: center;
            color: #000000;
        }

        p {
            padding: 0 20px 20px 20px;
            text-align: center;
            color: #000000;
        }

        footer {
            background-color: #9be8ff;
            color: #fff;
            padding: 10px 30px;
            margin-top: 40px;
            text-align: center;
        }

        footer p {
            margin-bottom: 20px;
            font-size: 14px;
            color: #000000;
        }

        footer table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        footer table td {
            padding: 15px;
            text-align: center;
            color: #000000;
    
        }

        table tr{
            display: flex;
            justify-content: center;
            gap: 200px;
        }

    

        footer table img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <h1>Meu Primeiro Rodapé</h1>
    <p>Este é um exemplo simples de como criar um rodapé em uma página HTML</p>
    <footer>
        <p>© 2026 Meu Website. Todos os direitos reservados</p>
        <table>
            <tr>
                <td>
                       <img src="./v915-vermelho-azul_53876-174923.avif" alt="Logo decorativo">
                    <div>Instagram @mello.gk_</div>
                </td>
                <td>
                    <img src="./v915-vermelho-azul_53876-174923.avif" alt="Logo GitHub">
                    <div>GitHub: kauaguilhermealmeidamelo</div>
                </td>
            </tr>
        </table>
    </footer>



</body>
</html>
